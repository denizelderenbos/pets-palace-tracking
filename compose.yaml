name: pets-palace-tracking

services:
  app:
    build:
      context: .
    environment:
      DATABASE_URL: postgresql://tracking:${POSTGRES_PASSWORD:?set in .env}@db:5432/tracking
      PORT: 3000
      TRUSTED_ORIGIN: ${TRUSTED_ORIGIN:-https://pets-palace.nl}
      SHOPIFY_SHOP_DOMAIN: ${SHOPIFY_SHOP_DOMAIN:-pets-palace-eu.myshopify.com}
      SHOPIFY_WEBHOOK_SECRET: ${SHOPIFY_WEBHOOK_SECRET:-}
      WORKLOAD_IDENTITY_ISSUER: ${WORKLOAD_IDENTITY_ISSUER:-https://track.pets-palace.nl}
      WORKLOAD_IDENTITY_KEY_ID: ${WORKLOAD_IDENTITY_KEY_ID:-pets-palace-tracking-v1}
      WORKLOAD_IDENTITY_PRIVATE_KEY: ${WORKLOAD_IDENTITY_PRIVATE_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - private

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: tracking
      POSTGRES_USER: tracking
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracking -d tracking"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    volumes:
      - tracking-postgres:/var/lib/postgresql/data
    networks:
      - private

networks:
  private:
    internal: true

volumes:
  tracking-postgres:
