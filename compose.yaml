name: pets-palace-tracking

services:
  app:
    build:
      context: .
    environment:
      DATABASE_URL: postgresql://tracking:${POSTGRES_PASSWORD:?set in .env}@db:5432/tracking
      PORT: 3000
      TRUSTED_ORIGIN: ${TRUSTED_ORIGIN:-https://pets-palace.nl}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - private

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: tracking
      POSTGRES_USER: tracking
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracking -d tracking"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    volumes:
      - tracking-postgres:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    networks:
      - private

networks:
  private:
    internal: true

volumes:
  tracking-postgres:
